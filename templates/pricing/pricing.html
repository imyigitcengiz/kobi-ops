{% extends 'base.html' %}

{% block title %}Fiyat Hesaplama | {{ site_settings.site_name }}{% endblock %}

{% block content %}
<div class="space-y-6">
    <h2 class="text-2xl font-bold text-slate-900">Fiyat Hesaplama Motoru</h2>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Ürün Seçimi</label>
                    <select id="product" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500">
                        {% for p in products %}
                        <option value="{{ p.name }}" data-price="{{ p.base_price }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Kurulum Tipi</label>
                    <select id="installType" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500">
                        <option value="demonte">Demonte Gönderim</option>
                        <option value="install">Montaj Dahil</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">En (cm)</label>
                    <input type="number" id="width" value="300" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Boy (cm)</label>
                    <input type="number" id="length" value="400" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500">
                </div>
            </div>

            <div class="flex items-center gap-4 p-4 bg-brand-50 rounded-2xl">
                <input type="checkbox" id="hasLed" class="w-5 h-5 accent-brand-600">
                <label for="hasLed" class="text-brand-900 font-medium">LED Aydınlatma Eklensin mi?</label>
            </div>

            <div id="distanceGroup" class="space-y-2 hidden">
                <label class="text-sm font-semibold text-slate-700">Mesafe (KM)</label>
                <input type="number" id="distance" value="0" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500">
            </div>
        </div>

        <div class="bg-slate-900 text-white p-8 rounded-3xl shadow-xl space-y-8 h-fit">
            <h3 class="text-xl font-bold text-brand-400 flex items-center gap-3">
                <i data-lucide="calculator"></i> Teklif Özeti
            </h3>

            <div class="space-y-4">
                <div class="flex justify-between text-slate-400">
                    <span>Ürün</span>
                    <span id="summaryProduct" class="text-white font-medium">-</span>
                </div>
                <div class="flex justify-between text-slate-400">
                    <span>Alan</span>
                    <span id="summaryArea" class="text-white font-medium">0 m²</span>
                </div>
                <div class="flex justify-between text-slate-400">
                    <span>LED</span>
                    <span id="summaryLed" class="text-white font-medium">Hayır</span>
                </div>
            </div>

            <div class="pt-8 border-t border-slate-800">
                <p class="text-slate-500 text-sm mb-1">Toplam Tutar</p>
                <p id="totalPrice" class="text-4xl font-bold text-brand-400">0,00 TL</p>
            </div>

            <button class="w-full bg-brand-600 hover:bg-brand-700 text-white py-4 rounded-2xl font-bold transition-all shadow-lg shadow-brand-900/50">
                Teklif Oluştur
            </button>
        </div>
    </div>
</div>

<script>
    const inputs = ['product', 'installType', 'width', 'length', 'hasLed', 'distance'];
    
    function calculate() {
        const product = document.getElementById('product');
        const basePrice = parseFloat(product.options[product.selectedIndex].dataset.price);
        const width = parseFloat(document.getElementById('width').value);
        const length = parseFloat(document.getElementById('length').value);
        const hasLed = document.getElementById('hasLed').checked;
        const installType = document.getElementById('installType').value;
        const distance = parseFloat(document.getElementById('distance').value);

        // Toggle distance field
        document.getElementById('distanceGroup').classList.toggle('hidden', installType !== 'install');

        const area = (width / 100) * (length / 100);
        let total = area * basePrice;
        
        if (hasLed) total += 1500;
        if (installType === 'install') {
            total += 1000 + (distance * 50);
        }

        // Update Summary
        document.getElementById('summaryProduct').innerText = product.value;
        document.getElementById('summaryArea').innerText = area.toFixed(2) + ' m²';
        document.getElementById('summaryLed').innerText = hasLed ? 'Evet' : 'Hayır';
        document.getElementById('totalPrice').innerText = new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(total);
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('change', calculate));
    inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
    
    calculate(); // Initial run
</script>
{% endblock %}
