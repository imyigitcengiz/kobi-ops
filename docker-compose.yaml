# KobiOps — production-ready Docker Compose (Ghost tarzı: volume compose içinde)
#
# Coolify / Dokploy / 1Panel — 3 adım:
#   1. GitHub imyigitcengiz/kobi-ops
#   2. Build Pack: Docker Compose  ← Dockerfile tek başına DEĞİL
#   3. Compose path: docker-compose.yaml (repo kökü)
#
# Named volume gy_data otomatik oluşur; Persistent Storage UI gerekmez.

name: kobi-ops

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DATA_DIR: /data
      DJANGO_DB_PATH: /data/db.sqlite3
      DJANGO_MEDIA_ROOT: /data/media
      DJANGO_SERVE_MEDIA: "1"
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ENSURE_SUPERADMIN: ${DJANGO_ENSURE_SUPERADMIN:-1}
      GY_REQUIRE_PERSISTENT_VOLUME: ${GY_REQUIRE_PERSISTENT_VOLUME:-1}
      GY_ALLOW_EPHEMERAL_DATA: ${GY_ALLOW_EPHEMERAL_DATA:-0}
      WHATSAPP_BRIDGE_URL: http://whatsapp_bridge:3939
      DJANGO_WHATSAPP_BRIDGE_CAN_SPAWN: "0"
      DJANGO_WHATSAPP_BRIDGE_AUTO_START: "0"
      DJANGO_WHATSAPP_BRIDGE_WAIT_ON_START: "1"
      KOBIOPS_COMPOSE_STACK: "1"
      MEDIA_COMPRESS_ENABLED: ${MEDIA_COMPRESS_ENABLED:-1}
      # Panel override (boş bırakılırsa bootstrap otomatik doldurur)
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECURE_SSL: ${DJANGO_SECURE_SSL:-}
      # Coolify magic değişkenler (Domain sekmesinde app:8000 tanımlayınca gelir)
      SERVICE_FQDN_APP: ${SERVICE_FQDN_APP:-}
      SERVICE_URL_APP: ${SERVICE_URL_APP:-}
    env_file:
      - path: .env
        required: false
    volumes:
      - gy_data:/data
    depends_on:
      whatsapp_bridge:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/healthz/' % os.environ.get('PORT','8000'), timeout=5)",
        ]
      interval: 30s
      timeout: 8s
      start_period: 180s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M

  # Alt çizgi: Coolify SERVICE_FQDN_* uyumluluğu (tireli ad .env'de sorun çıkarır)
  whatsapp_bridge:
    build:
      context: .
      dockerfile: deploy/whatsapp-bridge/Dockerfile
    restart: unless-stopped
    expose:
      - "3939"
    shm_size: "512mb"
    volumes:
      - whatsapp_session:/app/session
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:'+(process.env.WHATSAPP_BRIDGE_PORT||3939)+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1536M

volumes:
  gy_data:
    name: kobiops_gy_data
  whatsapp_session:
    name: kobiops_whatsapp_session
