# Sadece docker load ile gelen imaj için (kaynak kod sunucuda yok)
# Kullanım: docker compose -f deploy/docker/docker-compose.server.yml --env-file .env.docker up -d

services:
  web:
    image: gy-dashboard-py:latest
    container_name: gy-dashboard-web
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env.docker
    environment:
      PORT: "8000"
      DAPHNE_HOST: "0.0.0.0"
      DATA_DIR: "/data"
      DJANGO_DB_PATH: "/data/db.sqlite3"
      DJANGO_MEDIA_ROOT: "/data/media"
      DJANGO_SERVE_MEDIA: "1"
    volumes:
      - gy_dashboard_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  gy_dashboard_data:
    name: gy_dashboard_data
