# KobiOps — panel + WhatsApp köprüsü (Dokploy, 1Panel, ham Docker)
# Dokploy Compose path: docker-compose.yml  |  Domains → app:8000  |  .env → env_file
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      WHATSAPP_BRIDGE_URL: http://whatsapp-bridge:3939
      DJANGO_WHATSAPP_BRIDGE_CAN_SPAWN: "0"
      DJANGO_WHATSAPP_BRIDGE_AUTO_START: "0"
    volumes:
      - gy_data:/data
    depends_on:
      whatsapp-bridge:
        condition: service_started

  whatsapp-bridge:
    build:
      context: .
      dockerfile: deploy/whatsapp-bridge/Dockerfile
    restart: unless-stopped
    expose:
      - "3939"
    volumes:
      - whatsapp_session:/app/session

volumes:
  gy_data:
  whatsapp_session:
